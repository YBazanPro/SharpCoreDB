name: Publish @sharpcoredb/client to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish'
        required: true
        default: 'beta'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Run type check
      run: npm run typecheck

    - name: Build package
      run: npm run build

    - name: Verify build
      run: |
        if [ ! -f "dist/index.js" ]; then
          echo "Build failed - dist/index.js not found"
          exit 1
        fi
        if [ ! -f "dist/index.d.ts" ]; then
          echo "Build failed - dist/index.d.ts not found"
          exit 1
        fi

    - name: Publish to npm beta
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.version == 'beta'
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: npm publish --tag beta

    - name: Publish to npm
      if: github.event_name == 'release'
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: npm publish

    - name: Create GitHub release notes
      if: github.event_name == 'release'
      run: |
        echo "## @sharpcoredb/client ${{ github.event.release.tag_name }}" >> release_notes.md
        echo "" >> release_notes.md
        echo "### Installation" >> release_notes.md
        echo "\`\`\`bash" >> release_notes.md
        echo "npm install @sharpcoredb/client" >> release_notes.md
        echo "\`\`\`" >> release_notes.md
        echo "" >> release_notes.md
        echo "### Changes" >> release_notes.md
        echo "- See [CHANGELOG.md](https://github.com/MPCoreDeveloper/SharpCoreDB/blob/main/clients/javascript/sharpcoredb-client/CHANGELOG.md)" >> release_notes.md
