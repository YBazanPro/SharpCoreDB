syntax = "proto3";

package sharpcoredb.v1;

option csharp_namespace = "SharpCoreDB.Server.Protocol";

// ============================================================================
// Core Database Service (v1.5.0)
// ============================================================================

/// <summary>
/// Main database service for query execution, transactions, and operations.
/// </summary>
service DatabaseService {
  // Query execution
  rpc ExecuteQuery(QueryRequest) returns (QueryResponse);
  rpc ExecuteQueryStream(QueryRequest) returns (stream QueryRow);
  rpc ExecuteBatch(BatchRequest) returns (BatchResponse);
  
  // Transaction management
  rpc BeginTransaction(TransactionOptions) returns (TransactionHandle);
  rpc CommitTransaction(TransactionHandle) returns (CommitResponse);
  rpc RollbackTransaction(TransactionHandle) returns (RollbackResponse);
  
  // Health and monitoring
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc GetServerInfo(ServerInfoRequest) returns (ServerInfoResponse);
}

// ============================================================================
// Messages - Query Execution
// ============================================================================

message QueryRequest {
  string sql = 1;
  map<string, bytes> parameters = 2;
  int32 timeout_ms = 3;
  string transaction_id = 4;  // Optional: execute within transaction
  QueryOptions options = 5;
}

message QueryOptions {
  bool streaming = 1;  // Enable result streaming
  int32 fetch_size = 2;  // Rows per batch (default: 1000)
  bool include_execution_plan = 3;  // Return query plan
}

message QueryResponse {
  repeated Column columns = 1;
  repeated Row rows = 2;
  int32 rows_affected = 3;
  double execution_time_ms = 4;
  string execution_plan = 5;  // If requested
  QueryMetadata metadata = 6;
}

message QueryRow {
  repeated bytes values = 1;
}

message Column {
  string name = 1;
  DataType type = 2;
  bool nullable = 3;
}

enum DataType {
  INTEGER = 0;
  LONG = 1;
  REAL = 2;
  STRING = 3;
  BLOB = 4;
  BOOLEAN = 5;
  DATETIME = 6;
  GUID = 7;
  ULID = 8;
  ROWREF = 9;  // GraphRAG 1.0
  VECTOR = 10;  // Vector search
  DECIMAL = 11;
}

message Row {
  repeated bytes values = 1;
}

message QueryMetadata {
  int64 total_rows = 1;  // If known
  bool has_more = 2;  // For paging
  string cursor = 3;  // For continuation
}

// ============================================================================
// Messages - Batch Operations
// ============================================================================

message BatchRequest {
  repeated QueryRequest queries = 1;
  bool transactional = 2;  // Wrap in transaction
  int32 timeout_ms = 3;
}

message BatchResponse {
  repeated QueryResponse results = 1;
  bool success = 2;
  string error_message = 3;
  double total_execution_time_ms = 4;
}

// ============================================================================
// Messages - Transactions
// ============================================================================

message TransactionOptions {
  IsolationLevel isolation_level = 1;
  int32 timeout_ms = 2;
  bool read_only = 3;
}

enum IsolationLevel {
  READ_COMMITTED = 0;
  REPEATABLE_READ = 1;
  SERIALIZABLE = 2;
}

message TransactionHandle {
  string transaction_id = 1;
  int64 started_at = 2;  // Unix timestamp
}

message CommitResponse {
  bool success = 1;
  string error_message = 2;
  double commit_time_ms = 3;
}

message RollbackResponse {
  bool success = 1;
  string error_message = 2;
}

// ============================================================================
// Messages - Health & Monitoring
// ============================================================================

message HealthCheckRequest {
  bool detailed = 1;  // Include detailed metrics
}

message HealthCheckResponse {
  HealthStatus status = 1;
  string version = 2;
  int64 uptime_seconds = 3;
  HealthMetrics metrics = 4;
}

enum HealthStatus {
  HEALTHY = 0;
  DEGRADED = 1;
  UNHEALTHY = 2;
}

message HealthMetrics {
  int32 active_connections = 1;
  int32 active_transactions = 2;
  double cpu_usage_percent = 3;
  int64 memory_usage_bytes = 4;
  int64 disk_usage_bytes = 5;
  double queries_per_second = 6;
}

message ServerInfoRequest {
  bool include_features = 1;
}

message ServerInfoResponse {
  string version = 1;
  string build_date = 2;
  string runtime_version = 3;
  repeated string enabled_features = 4;
  ServerCapabilities capabilities = 5;
}

message ServerCapabilities {
  bool supports_transactions = 1;
  bool supports_vector_search = 2;
  bool supports_graph_rag = 3;
  bool supports_analytics = 4;
  bool supports_encryption = 5;
  int32 max_connections = 6;
}

// ============================================================================
// Vector Search Service (v1.5.0)
// ============================================================================

service VectorSearchService {
  rpc VectorSearch(VectorSearchRequest) returns (VectorSearchResponse);
  rpc VectorSearchStream(VectorSearchRequest) returns (stream VectorMatch);
}

message VectorSearchRequest {
  string table_name = 1;
  string vector_column = 2;
  repeated float query_vector = 3;
  int32 top_k = 4;
  DistanceMetric metric = 5;
  VectorSearchOptions options = 6;
}

enum DistanceMetric {
  COSINE = 0;
  EUCLIDEAN = 1;
  DOT_PRODUCT = 2;
  MANHATTAN = 3;
}

message VectorSearchOptions {
  double threshold = 1;  // Min similarity
  bool use_hnsw = 2;  // Use HNSW index
  int32 ef_search = 3;  // HNSW parameter
}

message VectorSearchResponse {
  repeated VectorMatch matches = 1;
  double execution_time_ms = 2;
}

message VectorMatch {
  int64 row_id = 1;
  double distance = 2;
  bytes row_data = 3;  // Serialized row
}

// ============================================================================
// Error Handling
// ============================================================================

message Error {
  ErrorCode code = 1;
  string message = 2;
  string details = 3;
  string sql_state = 4;  // SQL standard error code
}

enum ErrorCode {
  UNKNOWN = 0;
  INVALID_SQL = 1;
  CONSTRAINT_VIOLATION = 2;
  DEADLOCK = 3;
  TIMEOUT = 4;
  AUTHENTICATION_FAILED = 5;
  PERMISSION_DENIED = 6;
  CONNECTION_LOST = 7;
  RESOURCE_EXHAUSTED = 8;
}
